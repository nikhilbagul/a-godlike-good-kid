<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | A Godlike Good Kid</title>
    <link rel="stylesheet" href="./style.css">    
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("unity-canvas", "Build/WebGL.json");
    </script>
  </head>

  <body>    
    <div id="unity-canvas"></div>

    <script>
      var BASE_WIDTH = 769;
      var BASE_HEIGHT = 1024;
      var PADDING = 20;
      var ASPECT = BASE_WIDTH / BASE_HEIGHT;

      function resizeCanvas() {
        var maxW = window.innerWidth - PADDING * 2;
        var maxH = window.innerHeight - PADDING * 2;
        var w, h;

        if (maxW / maxH > ASPECT) {
          h = maxH;
          w = h * ASPECT;
        } else {
          w = maxW;
          h = w / ASPECT;
        }

        if (w > BASE_WIDTH) {
          w = BASE_WIDTH;
          h = BASE_HEIGHT;
        }

        w = Math.round(w);
        h = Math.round(h);

        // Resize the container
        var container = document.getElementById("unity-canvas");
        container.style.width = w + "px";
        container.style.height = h + "px";

        // Resize the actual Unity canvas element
        var canvas = container.querySelector("canvas");
        if (canvas) {
          canvas.width = w;
          canvas.height = h;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
        }
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
    </script>
  </body>
</html>
